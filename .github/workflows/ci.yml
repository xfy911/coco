name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        sanitizer: [none, asan, ubsan]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / ${{ matrix.sanitizer }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y liburing-dev

      - name: Configure
        run: |
          FLAGS=""
          if [ "${{ matrix.sanitizer }}" = "asan" ]; then FLAGS="-DCOCO_ENABLE_ASAN=ON"
          elif [ "${{ matrix.sanitizer }}" = "ubsan" ]; then FLAGS="-DCOCO_ENABLE_UBSAN=ON"
          fi
          cmake -B build $FLAGS

      - name: Build
        run: cmake --build build

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  coverage:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liburing-dev lcov

      - name: Build with coverage
        run: cmake -B build -DCOCO_ENABLE_COVERAGE=ON && cmake --build build

      - name: Generate coverage
        working-directory: build
        run: cmake --build . --target coverage

      - name: Check coverage threshold
        working-directory: build
        run: |
          lcov --summary coverage.cleaned.info 2>&1 | tee coverage_summary.txt
          LINES=$(grep 'lines' coverage_summary.txt | grep -oP '[\d.]+%' | head -1 | tr -d '%')
          echo "Line coverage: ${LINES}%"
          echo "$LINES > 70" | bc -l || (echo "Coverage below threshold" && exit 1)
